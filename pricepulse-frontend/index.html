<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- FIXED: removed user-scalable=no (accessibility issue) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <meta name="description" content="PricePulse — Compare real grocery prices reported by your community. Find the best deals near you on milk, oil, atta, and more." />
    <meta name="keywords" content="price comparison, grocery prices, community prices, best deals, PricePulse" />
    <meta name="author" content="Pokemon Team" />

    <!-- Open Graph -->
    <meta property="og:title" content="PricePulse — Live Price Tracker" />
    <meta property="og:description" content="Know before you buy. Real prices, reported by real people." />
    <meta property="og:type" content="website" />

    <meta name="theme-color" content="#6366f1" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <title>PricePulse — Live Price Tracker</title>

    <!-- FIXED: Google Fonts via link tags (non-render-blocking) instead of CSS @import -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    </noscript>
  </head>
  <body>
    <!-- FIXED: main landmark for accessibility -->
    <div id="root" role="main"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
